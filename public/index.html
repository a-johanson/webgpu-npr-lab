<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPR based on WebGPU</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="controls">
    <label for="dpi">DPI:</label>
    <input type="number" id="dpi" placeholder="Enter DPI" min="10" step="1">
    <button type="button" id="applyDpi">Apply</button>
  </div>

  <canvas id="debugCanvas"></canvas>
  <div class="controls pb-20">
    <label for="gpuSeed">GPU Seed:</label>
    <input type="number" id="gpuSeed" placeholder="Enter GPU seed" min="0" step="1">
    <button type="button" id="applyGpuSeed">Apply</button>
    <button type="button" id="incrementGpuSeed">+1</button>
    <button type="button" id="randomizeGpuSeed">Rand</button>
    <label><input type="checkbox" id="autoRerenderNpr"> Auto re-render NPR</label>
  </div>

  <canvas id="outputCanvas"></canvas>
  <div class="controls pb-40">
    <label for="nprSeed">NPR Seed:</label>
    <input type="text" id="nprSeed" placeholder="Enter NPR seed">
    <button type="button" id="applyNprSeed">Apply</button>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
